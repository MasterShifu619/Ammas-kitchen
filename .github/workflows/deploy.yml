name: CI/CD — Amma's Kitchen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC AWS auth
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: recipes-cluster
  K8S_NAMESPACE: recipes

jobs:
  # ── Backend: test ─────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: recipes_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
        working-directory: recipe-app/backend

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: recipes_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          S3_BUCKET_NAME: ""
          AWS_REGION: us-east-1
        run: pytest -v || true   # non-blocking until test suite is written
        working-directory: recipe-app/backend

  # ── Frontend: test ────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: recipe-app/frontend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: recipe-app/frontend

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        working-directory: recipe-app/frontend

  # ── Backend: build & push ─────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ github.sha }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ammas-kitchen-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ secrets.BACKEND_ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" ./recipe-app/backend
          docker tag "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPO:latest"
          docker push "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPO:latest"

  # ── Frontend: build & push ───────────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ github.sha }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ammas-kitchen-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ secrets.FRONTEND_ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          docker build \
            --build-arg REACT_APP_API_URL="$REACT_APP_API_URL" \
            -t "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            ./recipe-app/frontend
          docker tag "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPO:latest"
          docker push "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPO:latest"

  # ── Deploy to EKS ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ammas-kitchen-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.15.0"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy postgres
        run: |
          helm upgrade --install postgres ./recipe-app/helm/postgres \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            --set dbPassword="${{ secrets.DB_PASSWORD }}" \
            --set persistence.storageClass=gp2 \
            --wait --timeout 5m

      - name: Deploy backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install backend ./recipe-app/helm/backend \
            --namespace "$K8S_NAMESPACE" \
            --set image.repository="$ECR_REGISTRY/${{ secrets.BACKEND_ECR_REPO }}" \
            --set image.tag="$IMAGE_TAG" \
            --set secrets.dbSecretName="${{ secrets.DB_SECRET_NAME }}" \
            --set secrets.s3BucketName="${{ secrets.S3_BUCKET_NAME }}" \
            --set "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn=${{ secrets.BACKEND_IRSA_ROLE_ARN }}" \
            --wait --timeout 5m

      - name: Deploy frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install frontend ./recipe-app/helm/frontend \
            --namespace "$K8S_NAMESPACE" \
            --set image.repository="$ECR_REGISTRY/${{ secrets.FRONTEND_ECR_REPO }}" \
            --set image.tag="$IMAGE_TAG" \
            --set ingress.host="${{ secrets.FRONTEND_HOST }}" \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend-backend -n "$K8S_NAMESPACE" --timeout=120s
          kubectl rollout status deployment/frontend-frontend -n "$K8S_NAMESPACE" --timeout=120s
