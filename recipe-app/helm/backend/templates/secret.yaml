# This Secret holds references to sensitive config values.
# Values are injected at deploy time via --set secrets.* flags (from CI/GitHub Actions secrets).
# No real credentials are ever stored in this chart or its values files.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_SECRET_NAME: {{ .Values.secrets.dbSecretName | quote }}
  S3_BUCKET_NAME: {{ .Values.secrets.s3BucketName | quote }}
