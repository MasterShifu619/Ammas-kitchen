# Password is provided at deploy time via --set dbPassword=<value> (from CI secrets).
# It is never stored in values.yaml or committed to source control.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "dbPassword is required" .Values.dbPassword | quote }}
